# Deploy NYC Pilates Studio Ranker (static MVP) to GitHub Pages.
#
# After this file is on your default branch:
# 1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# 2. Push to `main` (or merge a PR) so this workflow runs.
# 3. Site URL: https://<your-username>.github.io/cursor-sdlc-workshop/

name: Deploy Pilates MVP to Pages

on:
  push:
    branches:
      - main
    paths:
      - "projects/MadelynKraus/base_mvp/**"
      - ".github/workflows/deploy-pilates-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-pilates-mvp
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/MadelynKraus/base_mvp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
