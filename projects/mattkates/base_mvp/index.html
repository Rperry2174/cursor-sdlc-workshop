<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendSense Lite</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>SpendSense Lite</h1>
          <p class="subtitle">
            A simple home finance dashboard with practical cost-cutting advice.
          </p>
        </div>
        <img
          class="vault-image"
          src="./bank-vault.svg"
          alt="Bank vault icon"
          width="100"
          height="100"
        />
      </header>

      <section class="card" aria-labelledby="summary-heading">
        <h2 id="summary-heading">Monthly Summary</h2>
        <div id="summary" class="summary-grid"></div>
      </section>

      <section class="card" aria-labelledby="expenses-heading">
        <h2 id="expenses-heading">Expense Breakdown</h2>
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="expense-table-body"></tbody>
        </table>
      </section>

      <section class="card" aria-labelledby="advice-heading">
        <h2 id="advice-heading">Actionable Advice</h2>
        <ul id="advice-list"></ul>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
