<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Pilates Studio Ranker</title>
  <style>
    :root {
      --bg: #f6f3ef;
      --card: #fff;
      --text: #1c1917;
      --muted: #57534e;
      --accent: #4a6741;
      --accent-soft: #e8efe6;
      --border: #e7e5e4;
      --brooklyn: #1e3a5f;
      --manhattan: #44403c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 1.5rem clamp(1rem, 4vw, 2.5rem) 3rem;
    }
    header {
      max-width: 42rem;
      margin-bottom: 1.75rem;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .lede {
      color: var(--muted);
      font-size: 0.95rem;
    }
    #load-error {
      display: none;
      max-width: 42rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #7f1d1d;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    #load-error.visible { display: block; }
    #load-error code {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      background: #fff;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #fecaca;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #app { display: none; }
    #app.ready { display: block; }
    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 42rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem 1rem;
      box-shadow: 0 1px 2px rgba(28, 25, 23, 0.04);
    }
    .card-main { flex: 1; min-width: 12rem; }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .borough {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      margin-top: 0.45rem;
    }
    .borough.manhattan {
      background: #f5f5f4;
      color: var(--manhattan);
    }
    .borough.brooklyn {
      background: #e0e7ef;
      color: var(--brooklyn);
    }
    .score-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      align-items: flex-end;
    }
    .score-wrap label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    select {
      font: inherit;
      font-size: 0.95rem;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--text);
      cursor: pointer;
      min-width: 5.5rem;
    }
    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 42rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>NYC Pilates Studio Ranker</h1>
    <p class="lede">Manhattan &amp; Brooklyn studios only. Rate each studio; your list re-sorts with favorites on top. Scores are saved in this browser.</p>
  </header>

  <div id="load-error" role="alert"></div>
  <div id="app" aria-live="polite">
    <ul class="list" id="studio-list"></ul>
    <p class="hint">Higher scores float up. Same score? Sorted A–Z by studio name. Unrated studios stay at the bottom.</p>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = 'nyc-pilates-ranker-scores-v1';
      var DATA_URL = 'data/studios.json';

      /** @type {{ id: string, name: string, neighborhood: string, borough: string }[]} */
      var studios = [];
      var originalIndex = {};

      function getScores() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (e) {
          return {};
        }
      }

      function setScore(id, value) {
        var scores = getScores();
        if (value === 0 || value === '0') {
          delete scores[id];
        } else {
          scores[id] = Number(value);
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
      }

      function scoreFor(id, scores) {
        var n = scores[id];
        return typeof n === 'number' && n >= 1 && n <= 5 ? n : 0;
      }

      function sortedStudios(list, scores) {
        return list.slice().sort(function (a, b) {
          var sa = scoreFor(a.id, scores);
          var sb = scoreFor(b.id, scores);
          if (sb !== sa) return sb - sa;
          var na = a.name.toLowerCase();
          var nb = b.name.toLowerCase();
          if (na < nb) return -1;
          if (na > nb) return 1;
          return (originalIndex[a.id] || 0) - (originalIndex[b.id] || 0);
        });
      }

      function render() {
        var scores = getScores();
        var ordered = sortedStudios(studios, scores);
        var ul = document.getElementById('studio-list');
        ul.replaceChildren();

        ordered.forEach(function (studio) {
          var li = document.createElement('li');
          li.className = 'card';

          var main = document.createElement('div');
          main.className = 'card-main';

          var h2 = document.createElement('h2');
          h2.textContent = studio.name;
          main.appendChild(h2);

          var meta = document.createElement('p');
          meta.className = 'meta';
          meta.textContent = studio.neighborhood;
          main.appendChild(meta);

          var badge = document.createElement('span');
          badge.className = 'borough ' + (studio.borough === 'Brooklyn' ? 'brooklyn' : 'manhattan');
          badge.textContent = studio.borough;
          main.appendChild(badge);

          var wrap = document.createElement('div');
          wrap.className = 'score-wrap';

          var lbl = document.createElement('label');
          lbl.setAttribute('for', 'score-' + studio.id);
          lbl.textContent = 'Your score';
          wrap.appendChild(lbl);

          var sel = document.createElement('select');
          sel.id = 'score-' + studio.id;
          sel.setAttribute('aria-label', 'Score for ' + studio.name);

          ;[
            { v: '0', t: '—' },
            { v: '1', t: '1' },
            { v: '2', t: '2' },
            { v: '3', t: '3' },
            { v: '4', t: '4' },
            { v: '5', t: '5' }
          ].forEach(function (opt) {
            var o = document.createElement('option');
            o.value = opt.v;
            o.textContent = opt.t;
            sel.appendChild(o);
          });

          var current = scoreFor(studio.id, scores);
          sel.value = String(current);

          sel.addEventListener('change', function () {
            var v = parseInt(sel.value, 10);
            setScore(studio.id, isNaN(v) ? 0 : v);
            render();
          });

          wrap.appendChild(sel);
          li.appendChild(main);
          li.appendChild(wrap);
          ul.appendChild(li);
        });
      }

      function showLoadError(message, commandText) {
        var el = document.getElementById('load-error');
        el.textContent = message;
        if (commandText) {
          var code = document.createElement('code');
          code.textContent = commandText;
          el.appendChild(code);
        }
        el.classList.add('visible');
      }

      fetch(DATA_URL)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          if (!Array.isArray(data)) throw new Error('Invalid data');
          studios = data;
          studios.forEach(function (s, i) {
            originalIndex[s.id] = i;
          });
          document.getElementById('app').classList.add('ready');
          render();
        })
        .catch(function () {
          showLoadError(
            'Could not load studio data. Browsers often block loading JSON when you open this file as file://. From the base_mvp folder, run a local server and open localhost:',
            'python3 -m http.server 8765\n\nthen open → http://localhost:8765/'
          );
        });
    })();
  </script>
</body>
</html>
