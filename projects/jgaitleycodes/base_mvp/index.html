<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeRush</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  .container {
    width: 100%;
    max-width: 700px;
    padding: 2.5rem 2rem;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.25rem;
  }

  .tagline {
    color: #94a3b8;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  .passage-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 1.5rem;
    font-size: 1.25rem;
    line-height: 1.8;
    letter-spacing: 0.02em;
    min-height: 120px;
    margin-bottom: 1.5rem;
    font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
    position: relative;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .passage-box .char {
    transition: color 0.08s;
  }
  .passage-box .char.correct { color: #4ade80; }
  .passage-box .char.incorrect {
    color: #f87171;
    border-bottom: 2px solid #f87171;
  }
  .passage-box .char.current {
    background: rgba(56, 189, 248, 0.25);
    border-radius: 2px;
  }
  .passage-box .char.pending { color: #64748b; }

  .input-area {
    width: 100%;
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 1.15rem;
    font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
    color: #e2e8f0;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
  }
  .input-area:focus { border-color: #38bdf8; }
  .input-area:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #38bdf8;
    line-height: 1;
  }
  .stat-value.final { color: #4ade80; }

  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #64748b;
    margin-top: 0.3rem;
  }

  .controls {
    display: flex;
    gap: 0.75rem;
  }

  .btn {
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    color: #0f172a;
    box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(56, 189, 248, 0.35); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-ghost {
    background: transparent;
    color: #94a3b8;
    border: 1px solid #334155;
  }
  .btn-ghost:hover { background: #1e293b; }

  .result-banner {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(56, 189, 248, 0.1));
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: none;
    text-align: center;
  }
  .result-banner.visible { display: block; }

  .result-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #4ade80;
    margin-bottom: 0.75rem;
  }

  .result-stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1>TypeRush</h1>
  <p class="tagline">How fast can you type? Hit Start and find out.</p>

  <div class="passage-box" id="passage"></div>

  <input
    type="text"
    class="input-area"
    id="typingInput"
    placeholder="Click Start, then begin typing here..."
    disabled
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="timerDisplay">0.0</span>
      <span class="stat-label">Seconds</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="wpmDisplay">—</span>
      <span class="stat-label">WPM</span>
    </div>
  </div>

  <div class="result-banner" id="resultBanner">
    <div class="result-title">Round Complete!</div>
    <div class="result-stats">
      <div class="stat">
        <span class="stat-value final" id="finalWpm">0</span>
        <span class="stat-label">WPM</span>
      </div>
      <div class="stat">
        <span class="stat-value final" id="finalTime">0</span>
        <span class="stat-label">Seconds</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn">Start</button>
    <button class="btn btn-ghost" id="resetBtn" style="display:none">Try Again</button>
  </div>
</div>

<script>
(function () {
  const PASSAGE =
    "The quick brown fox jumps over the lazy dog. " +
    "Pack my box with five dozen liquor jugs. " +
    "How vexingly quick daft zebras jump!";

  const passageEl = document.getElementById("passage");
  const inputEl = document.getElementById("typingInput");
  const timerEl = document.getElementById("timerDisplay");
  const wpmEl = document.getElementById("wpmDisplay");
  const startBtn = document.getElementById("startBtn");
  const resetBtn = document.getElementById("resetBtn");
  const resultBanner = document.getElementById("resultBanner");
  const finalWpmEl = document.getElementById("finalWpm");
  const finalTimeEl = document.getElementById("finalTime");

  let startTime = null;
  let timerInterval = null;
  let finished = false;

  function renderPassage(typed) {
    const chars = PASSAGE.split("");
    const spans = chars.map(function (ch, i) {
      let cls = "char pending";
      if (i < typed.length) {
        cls = typed[i] === ch ? "char correct" : "char incorrect";
      } else if (i === typed.length) {
        cls = "char current pending";
      }
      const span = document.createElement("span");
      span.className = cls;
      span.textContent = ch;
      return span;
    });
    passageEl.replaceChildren.apply(passageEl, spans);
  }

  function elapsedSeconds() {
    if (!startTime) return 0;
    return (Date.now() - startTime) / 1000;
  }

  function computeWpm(typed, seconds) {
    if (seconds <= 0) return 0;
    var correctChars = 0;
    for (var i = 0; i < typed.length; i++) {
      if (typed[i] === PASSAGE[i]) correctChars++;
    }
    return Math.round((correctChars / 5) / (seconds / 60));
  }

  function tickTimer() {
    var secs = elapsedSeconds();
    timerEl.textContent = secs.toFixed(1);

    var typed = inputEl.value;
    if (typed.length > 0) {
      var wpm = computeWpm(typed, secs);
      wpmEl.textContent = wpm;
    }
  }

  function finishRound() {
    finished = true;
    clearInterval(timerInterval);
    inputEl.disabled = true;

    var secs = elapsedSeconds();
    var typed = inputEl.value;
    var wpm = computeWpm(typed, secs);

    timerEl.textContent = secs.toFixed(1);
    wpmEl.textContent = wpm;
    finalWpmEl.textContent = wpm;
    finalTimeEl.textContent = secs.toFixed(1);

    resultBanner.classList.add("visible");
    startBtn.style.display = "none";
    resetBtn.style.display = "inline-block";
  }

  function resetRound() {
    finished = false;
    startTime = null;
    clearInterval(timerInterval);
    inputEl.value = "";
    inputEl.disabled = true;
    timerEl.textContent = "0.0";
    wpmEl.textContent = "—";
    resultBanner.classList.remove("visible");
    startBtn.style.display = "inline-block";
    startBtn.disabled = false;
    resetBtn.style.display = "none";
    renderPassage("");
  }

  function startRound() {
    finished = false;
    startTime = Date.now();
    inputEl.disabled = false;
    inputEl.value = "";
    inputEl.focus();
    startBtn.disabled = true;
    timerInterval = setInterval(tickTimer, 100);
    renderPassage("");
  }

  inputEl.addEventListener("input", function () {
    if (finished) return;
    var typed = inputEl.value;
    renderPassage(typed);

    if (typed.length >= PASSAGE.length) {
      finishRound();
    }
  });

  // Prevent pasting
  inputEl.addEventListener("paste", function (e) {
    e.preventDefault();
  });

  startBtn.addEventListener("click", startRound);
  resetBtn.addEventListener("click", resetRound);

  renderPassage("");
})();
</script>
</body>
</html>
