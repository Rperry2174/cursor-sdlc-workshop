<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubSpend</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>SubSpend</h1>
        <p class="tagline">Track recurring subscriptions — stored only in this browser.</p>
      </header>

      <section class="card" aria-labelledby="add-heading">
        <h2 id="add-heading" class="section-title">Add subscription</h2>
        <form id="form" class="form">
          <label class="field">
            <span>Name</span>
            <input id="name" type="text" name="name" required autocomplete="off" placeholder="e.g. Streaming" />
          </label>
          <label class="field">
            <span>Amount</span>
            <input id="amount" type="number" name="amount" required min="0" step="0.01" placeholder="0.00" />
          </label>
          <label class="field">
            <span>Billing</span>
            <select id="period" name="period">
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </label>
          <button type="submit" class="btn primary">Add</button>
        </form>
      </section>

      <section class="card" aria-labelledby="list-heading">
        <h2 id="list-heading" class="section-title">Subscriptions</h2>
        <p id="empty" class="empty hidden" role="status">No subscriptions yet — add one above.</p>
        <div class="table-wrap">
          <table class="table" id="table" hidden>
            <thead>
              <tr>
                <th scope="col">Name</th>
                <th scope="col">You pay</th>
                <th scope="col">Monthly equivalent</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>

      <section class="card total-card" aria-labelledby="total-heading">
        <h2 id="total-heading" class="section-title">Estimated monthly total</h2>
        <p class="total-amount" id="total-display">$0.00 / month</p>
        <p class="total-note" id="total-note"></p>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
